name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.5.0). Must match an existing git tag.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - target: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            rust_target: x86_64-apple-darwin
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build dpm
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          make embed
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" -o "dpm-${{ matrix.target }}" ./cmd/dpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui

      - name: Build dpm-tui (with retry on transient network errors)
        shell: bash
        working-directory: tui
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
          CARGO_NET_RETRY: '10'
          CARGO_HTTP_MULTIPLEXING: 'false'
        run: |
          attempt=1
          until cargo build --release --target ${{ matrix.rust_target }}; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::cargo build failed after $attempt attempts"
              exit 1
            fi
            echo "::warning::cargo build attempt $attempt failed, retrying after 30s (likely transient DNS/network)"
            sleep 30
            attempt=$((attempt + 1))
          done
          cp "target/${{ matrix.rust_target }}/release/dpm-tui" "../dpm-tui-${{ matrix.target }}"

      - name: Generate per-binary sha256
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then HASH() { sha256sum "$1"; }
          else HASH() { shasum -a 256 "$1"; }
          fi
          for f in "dpm-${{ matrix.target }}" "dpm-tui-${{ matrix.target }}"; do
            HASH "$f" | awk '{print $1}' > "$f.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dpm-bundle-${{ matrix.target }}
          path: |
            dpm-${{ matrix.target }}
            dpm-${{ matrix.target }}.sha256
            dpm-tui-${{ matrix.target }}
            dpm-tui-${{ matrix.target }}.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Combined checksums.sha256
        shell: bash
        working-directory: artifacts
        run: |
          (
            for f in dpm-* dpm-tui-*; do
              [ -f "$f" ] || continue
              case "$f" in *.sha256) continue ;; esac
              sha256sum "$f"
            done
          ) > checksums.sha256
          echo "--- combined checksums ---"
          cat checksums.sha256

      - name: Resolve tag
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/dpm-*
            artifacts/checksums.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
